<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q41G Cesium KARTHIKEYAN</title>
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet" />
    <style>
        body {
            background: #ff0080;
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        h1 {
            color: #333;
        }
        p {
            font-size: 16px;
            line-height: 1.5;
        }

        .rating {
            display: flex;
            justify-content: center;
            align-items: center;
            grid-gap: 10px;
            font-size: 24px;
            gap: 10px;
            margin-bottom: 20px;
            color:rgb(253, 220, 30);
        }

        .wrapper {
            max-width: 400px;
            background-color: #f4f4f4;
            justify-content: center;
            align-items: center;
            font-size: 16px;
            width: 100%;
            margin: 0 auto;
            padding: 20px;
            border: 1px solid #000000;
            border-radius: 7px;
        }

        .wrapper h3 {
            text-align: center;
            margin-bottom: 20px;
            background-color: #f4f4f4;
            font-size: 24px;
        }

        .wrapper textarea {
            width: 100%;
            background-color: #f4f4f4;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        .wrapper .buttons {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 20px;
        }

        .rating {
            display: flex;
            justify-content: center;
            align-items: center;
            grid-gap: 10px;
            font-size: 24px;
            margin-bottom: 20px;
            color:rgb(253, 220, 30);
        }

        .Title, .Year, .Genre {
            width: 100%;
            background: #f4f4f4;
            border-radius: 5px;
            padding: 10px;
            margin-bottom: 10px;
        }

        .rating .star {
            cursor: pointer;
        }
         .rating .star.active {
            opacity: 0;
            animation: animate .5s ease-in-out forwards;
        }

    @keyframes animate {
        0% {
            opacity: 0;
            transform: scale(1);
        }
        50% {
            opacity: 1;
            transform: scale(1, 1.2);
        }
        100% {
            opacity: 1;
            transform: scale(1);
        }
    }

    </style>
</head>

<body>

    <div class="wrapper">
        <h3>Lorem ipsum</h3>
        <form id="RatingForm" action="#">
            <div class="rating">
                <input type="number" name="rating" hidden>
                <i class = 'bx bx-star'></i>
                <i class = 'bx bx-star'></i>
                <i class = 'bx bx-star'></i>
                <i class = 'bx bx-star'></i>
                <i class = 'bx bx-star'></i>
            </div>
                <textarea name="title" class="Title" placeholder="Title" cols="30" rows="5"></textarea>
                <textarea name="year" class="Year" placeholder="Year" cols="30" rows="5"></textarea>
                <textarea name="genre" class="Genre" placeholder="Genre" cols="30" rows="5"></textarea>
                <div class="buttons">
                    <button type="submit" class="button submit">Submit</button>
                    <button type="cancel" class="button cancel">Cancel</button>
                </div>
        </form>
    </div>

    <script src="scriptq41.js"></script>

</body>
</html>
